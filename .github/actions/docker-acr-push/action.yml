name: Docker build and push to ACR
description: Build the Remix Weather app image and push it to Azure Container Registry (requires prior azure/login).

inputs:
  registry-server:
    description: ACR login server hostname (for example myregistry.azurecr.io).
    required: true
  acr-name:
    description: ACR short name used by az acr login.
    required: true
  image-repository:
    description: Image repository path inside the registry (for example weather-app).
    required: true
  image-tag:
    description: Image tag (for example the commit SHA).
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to ACR
      shell: bash
      run: az acr login --name "${{ inputs.acr-name }}"

    - name: Build and push image
      shell: bash
      run: |
        set -euo pipefail
        image="${{ inputs.registry-server }}/${{ inputs.image-repository }}:${{ inputs.image-tag }}"
        docker build -t "$image" .
        docker push "$image"
