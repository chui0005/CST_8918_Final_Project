name: Terraform plan (PR to main)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - '.github/workflows/terraform-plan-pr.yml'
  push:
    branches-ignore:
      - main
    paths:
      - 'infrastructure/**'
      - '.github/workflows/terraform-plan-pr.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tflint-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        environment: [test, prod]
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      TF_IN_AUTOMATION: true
      AZURE_LOGIN_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
      AZURE_LOGIN_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_LOGIN_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_weather_api_key: ${{ secrets.WEATHER_API_KEY }}
    defaults:
      run:
        working-directory: infrastructure/environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Require Azure OIDC configuration
        shell: bash
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          if [ -z "${AZURE_LOGIN_CLIENT_ID}" ] || [ -z "${AZURE_LOGIN_TENANT_ID}" ] || [ -z "${AZURE_LOGIN_SUBSCRIPTION_ID}" ]; then
            echo "::error::Set Actions secrets AZURE_CLIENT_ID (or repository variable), AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID. Pull requests from forks cannot use this repo's secrets."
            exit 1
          fi
          if [ -z "${WEATHER_API_KEY}" ]; then
            echo "::error::Set Actions secret WEATHER_API_KEY (OpenWeather key for Terraform variable weather_api_key)."
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_LOGIN_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_LOGIN_TENANT_ID }}
          subscription-id: ${{ env.AZURE_LOGIN_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.51.2
          github_token: ${{ github.token }}

      - name: Terraform init
        run: terraform init -input=false

      - name: TFLint init (plugins)
        working-directory: infrastructure
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init --config .tflint.hcl

      - name: TFLint
        working-directory: infrastructure
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # --config is resolved relative to --chdir; use repo-root path so plugins from --init still apply.
        run: tflint --format compact --config "${GITHUB_WORKSPACE}/infrastructure/.tflint.hcl" --chdir=environments/${{ matrix.environment }}

      - name: Terraform plan
        run: terraform plan -no-color -input=false -out=tfplan.binary

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infrastructure/environments/${{ matrix.environment }}/tfplan.binary
          if-no-files-found: warn

