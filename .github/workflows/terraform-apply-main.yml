name: Terraform apply (main)

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - '.github/workflows/terraform-apply-main.yml'

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        environment: [test, prod]
    concurrency:
      group: terraform-apply-${{ matrix.environment }}
      cancel-in-progress: false
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      TF_IN_AUTOMATION: true
      AZURE_LOGIN_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
      AZURE_LOGIN_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_LOGIN_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_weather_api_key: ${{ secrets.WEATHER_API_KEY || vars.WEATHER_API_KEY }}
    defaults:
      run:
        working-directory: infrastructure/environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Require Azure OIDC configuration
        shell: bash
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY || vars.WEATHER_API_KEY }}
        run: |
          if [ -z "${AZURE_LOGIN_CLIENT_ID}" ] || [ -z "${AZURE_LOGIN_TENANT_ID}" ] || [ -z "${AZURE_LOGIN_SUBSCRIPTION_ID}" ]; then
            echo "::error::Set Actions secrets AZURE_CLIENT_ID (or repository variable), AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID."
            exit 1
          fi
          if [ -z "${WEATHER_API_KEY}" ]; then
            echo "::error::Set repository secret WEATHER_API_KEY or variable WEATHER_API_KEY (OpenWeather key → Terraform weather_api_key)."
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_LOGIN_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_LOGIN_TENANT_ID }}
          subscription-id: ${{ env.AZURE_LOGIN_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        run: terraform init -input=false

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.2.17

      - name: AKS credentials for Kubernetes provider
        shell: bash
        env:
          GROUP_NUMBER: ${{ vars.GROUP_NUMBER }}
          AKS_TEST_RG: ${{ vars.AKS_TEST_RESOURCE_GROUP }}
          AKS_PROD_RG: ${{ vars.AKS_PROD_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          gpn="${GROUP_NUMBER:-9}"
          case "${{ matrix.environment }}" in
            test)
              rg="${AKS_TEST_RG:-cst8918-final-project-group-${gpn}}"
              cluster="aks-cst8918-test-group-${gpn}"
              ;;
            prod)
              rg="${AKS_PROD_RG:-cst8918-final-project-group-${gpn}}"
              cluster="aks-cst8918-prod-group-${gpn}"
              ;;
            *)
              echo "::error::Unknown environment ${{ matrix.environment }}"
              exit 1
              ;;
          esac
          az aks get-credentials --resource-group "$rg" --name "$cluster" --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
