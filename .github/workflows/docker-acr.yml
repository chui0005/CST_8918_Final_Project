name: Docker image to ACR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'remix.config.js'
      - 'remix.env.d.ts'
      - 'tsconfig.json'
      - '.github/workflows/docker-acr.yml'
      - '.github/actions/docker-acr-push/**'

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GROUP_NUMBER: ${{ vars.GROUP_NUMBER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR settings
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          gpn="${GROUP_NUMBER:-9}"
          if [ -n "${{ vars.ACR_NAME }}" ]; then
            echo "name=${{ vars.ACR_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=cst8918acr${gpn}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ vars.ACR_LOGIN_SERVER }}" ]; then
            echo "server=${{ vars.ACR_LOGIN_SERVER }}" >> "$GITHUB_OUTPUT"
          else
            echo "server=cst8918acr${gpn}.azurecr.io" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: ./.github/actions/docker-acr-push
        with:
          registry-server: ${{ steps.acr.outputs.server }}
          acr-name: ${{ steps.acr.outputs.name }}
          image-repository: weather-app
          image-tag: ${{ github.sha }}
